    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script>
      const fbConfig = JSON.parse(document.getElementById('fb-config').textContent);
      const _app = firebase.initializeApp(fbConfig);
      const _db  = firebase.database();
      window.firebaseApp = { initializeApp: () => _app };
      window.firebaseDB  = {
        getDatabase: () => _db,
        ref:    (db, path) => _db.ref(path),
        onValue:(r, cb, err) => { r.on('value', snap => cb(snap), err); return () => r.off('value'); },
        set:    (r, val)    => r.set(val),
        get:    (r)         => r.once('value'),
      };
    </script>

    <style>* { box-sizing: border-box; } body { margin: 0; padding: 0; background: #0f172a; }</style>
