<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>투자 포트폴리오</title>
    <meta name="theme-color" content="#0f172a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script>
      const _app = firebase.initializeApp({
        apiKey: "AIzaSyBgTGU7VOzHYfMxwrfaJ3Cfs8h-PBgIg9I",
        authDomain: "stockmanagehw.firebaseapp.com",
        databaseURL: "https://stockmanagehw-default-rtdb.firebaseio.com",
        projectId: "stockmanagehw",
        storageBucket: "stockmanagehw.firebasestorage.app",
        messagingSenderId: "270180846160",
        appId: "1:270180846160:web:4f2a2b364bac5652841f55"
      });
      const _db = firebase.database();
      const _auth = firebase.auth();
      window.firebaseApp = { initializeApp: () => _app };
      window.firebaseAuth = {
        getAuth: () => _auth,
        currentUser: () => _auth.currentUser,
        signInAnonymously: () => _auth.signInAnonymously(),
        onAuthStateChanged: (cb) => _auth.onAuthStateChanged(cb),
        getIdToken: (forceRefresh = false) => _auth.currentUser ? _auth.currentUser.getIdToken(forceRefresh) : Promise.resolve(null),
      };
      window.firebaseDB = {
        getDatabase: () => _db,
        ref:     (db, path) => _db.ref(path),
        onValue: (r, cb, err) => { r.on('value', snap => cb(snap), err); return () => r.off('value'); },
        set:     (r, val) => r.set(val),
        update:  (r, val) => r.update(val),
        push:    (r, val) => r.push(val),
        get:     (r) => r.once('value'),
      };
    </script>
    <style>
      * { box-sizing: border-box; }
      html { min-height: 100%; background: #0f172a; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
      body { margin: 0; padding: 0; min-height: 100%; width: 100%; overflow-x: hidden; background: #0f172a; overscroll-behavior-y: none; }
      #root { min-height: 100dvh; background: #0f172a; }
      button, input, select, textarea { font: inherit; }
      img, svg, canvas, video { max-width: 100%; }
    </style>
  </head>
  <body>

    <script type="module" src="/src/morning-report-widget.js"></script>
  </body>
</html>
